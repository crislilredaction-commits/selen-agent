name: Selion Agent

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NDA_CSV_URL: ${{ secrets.NDA_CSV_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Debug env presence
        run: |
          echo "SUPABASE URL present: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}"
          echo "SERVICE ROLE present: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}"
          echo "CSV URL present: ${{ secrets.NDA_CSV_URL != '' }}"

      - name: Run Selion base agent
        run: npx tsx scripts/selen-agent.ts

      - name: Send first emails
        run: npx tsx scripts/send-first-emails.ts

      - name: Send followups
        run: npx tsx scripts/send-followups.ts
