name: Selion Agent

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NDA_CSV_URL: ${{ secrets.NDA_CSV_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_SENDING_ENABLED: ${{ vars.EMAIL_SENDING_ENABLED }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Debug env presence
        run: |
          echo "SUPABASE URL present: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}"
          echo "SERVICE ROLE present: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}"
          echo "CSV URL present: ${{ secrets.NDA_CSV_URL != '' }}"
          echo "RESEND API KEY present: ${{ secrets.RESEND_API_KEY != '' }}"
          echo "EMAIL_SENDING_ENABLED present: ${{ vars.EMAIL_SENDING_ENABLED != '' }}"

      - name: Run Selion full agent
        run: npx tsx scripts/selen-agent.ts
